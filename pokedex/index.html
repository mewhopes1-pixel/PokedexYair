<!DOCTYPE html>
<html lang="es">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pokem.css">
    <title>Pokedex</title>
</head>
<body>

    <div class="pokedex-device">
        
        <span class="led led-left"></span>
        <span class="led led-right"></span>

        <h1>POKEDEX</h1>

        <div class="search-container">
            <input type="text" id="pokemonName" placeholder="Ingrese el nombre del Pokémon">
            <button onclick="obtenerPokemon(document.getElementById('pokemonName').value)">
                <span class="search-icon">🔍</span> Buscar
            </button>
        </div>
        
        <div id="pokemon" class="pokemon-grid"></div>
        
        <div class="device-footer">
            <div class="pokeball-button"></div>
        </div>
    </div>

    <script src="hoy.js"></script>
</body>
</html>
